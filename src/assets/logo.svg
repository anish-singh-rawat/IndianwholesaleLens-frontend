<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5EADD4"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#5EADD4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="110" cy="110" r="96" stroke="url(#g1)" stroke-width="2.5" opacity="0.3"/>
  <circle cx="110" cy="110" r="88" stroke="url(#g1)" stroke-width="1" opacity="0.15"/>

  <!-- Aperture blades (6 rotated ellipses) -->
  <g filter="url(#glow)">
    <ellipse cx="110" cy="72" rx="20" ry="40" fill="url(#g2)" opacity="0.80"/>
    <ellipse cx="110" cy="72" rx="20" ry="40" fill="url(#g2)" opacity="0.80" transform="rotate(60 110 110)"/>
    <ellipse cx="110" cy="72" rx="20" ry="40" fill="url(#g2)" opacity="0.80" transform="rotate(120 110 110)"/>
    <ellipse cx="110" cy="72" rx="20" ry="40" fill="url(#g1)" opacity="0.65" transform="rotate(180 110 110)"/>
    <ellipse cx="110" cy="72" rx="20" ry="40" fill="url(#g1)" opacity="0.65" transform="rotate(240 110 110)"/>
    <ellipse cx="110" cy="72" rx="20" ry="40" fill="url(#g1)" opacity="0.65" transform="rotate(300 110 110)"/>
  </g>

  <!-- Centre pupil -->
  <circle cx="110" cy="110" r="26" fill="url(#g1)"/>
  <circle cx="110" cy="110" r="16" fill="#041226"/>
  <!-- Specular highlight -->
  <circle cx="117" cy="103" r="5" fill="white" opacity="0.55"/>

  <!-- Aperture tick marks -->
  <g stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.45">
    <line x1="110" y1="10" x2="110" y2="22"/>
    <line x1="110" y1="10" x2="110" y2="22" transform="rotate(60 110 110)"/>
    <line x1="110" y1="10" x2="110" y2="22" transform="rotate(120 110 110)"/>
    <line x1="110" y1="10" x2="110" y2="22" transform="rotate(180 110 110)"/>
    <line x1="110" y1="10" x2="110" y2="22" transform="rotate(240 110 110)"/>
    <line x1="110" y1="10" x2="110" y2="22" transform="rotate(300 110 110)"/>
  </g>
</svg>
